<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rich-js-ink — Live Playground</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    :root {
      --bg: #0d1117;
      --bg-surface: #161b22;
      --bg-elevated: #1c2129;
      --border: #30363d;
      --border-active: #58a6ff;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-subtle: #1f6feb33;
      --green: #3fb950;
      --purple: #bc8cff;
      --orange: #f0883e;
      --red: #ff7b72;
      --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      text-align: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline;
    }

    header .tagline {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    header .tagline-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* 3-column playground */
    .playground {
      display: grid;
      grid-template-columns: 220px 1fr 1fr;
      flex: 1;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }

    .col {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--border);
    }

    .col:last-child { border-right: none; }

    .col-header {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    /* Column 1: Selector */
    .col-selector {
      background: var(--bg-surface);
      overflow-y: auto;
    }

    .demo-list {
      list-style: none;
      padding: 0.25rem 0;
    }

    .demo-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .demo-item:hover {
      background: var(--bg-elevated);
    }

    .demo-item.active {
      background: var(--accent-subtle);
      border-left-color: var(--accent);
    }

    .demo-title {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .demo-item.active .demo-title {
      color: var(--accent);
    }

    .demo-desc {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.3;
      margin-top: 0.15rem;
    }

    /* Column 2: Editor */
    .col-editor {
      background: var(--bg);
    }

    #editor-mount {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #editor-mount .cm-editor {
      height: 100%;
    }

    /* Column 3: Terminal */
    .col-terminal {
      background: var(--bg);
      position: relative;
    }

    #terminal-mount {
      flex: 1;
      min-height: 0;
      padding: 0.5rem;
      overflow: hidden;
    }

    .error-display {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ff7b7222;
      border-top: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      max-height: 30%;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Responsive: stack on narrow screens */
    @media (max-width: 900px) {
      body { overflow: auto; }
      #app { height: auto; }
      .playground {
        grid-template-columns: 1fr;
        grid-template-rows: auto 300px 300px;
      }
      .col { border-right: none; border-bottom: 1px solid var(--border); }
      .col-selector { max-height: 200px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <p style="text-align: center; color: #8b949e; padding: 4rem 0;">Loading playground...</p>
  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
