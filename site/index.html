<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rich-js-ink — Component Gallery</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg-surface: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-subtle: #1f6feb33;
      --green: #3fb950;
      --purple: #bc8cff;
      --orange: #f0883e;
      --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      min-height: 100vh;
    }

    #app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    header {
      text-align: center;
      padding: 3rem 0 2rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 3rem;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.5rem;
    }

    header .tagline {
      color: var(--text-muted);
      font-size: 1.15rem;
      max-width: 600px;
      margin: 0 auto 0.5rem;
    }

    header .tagline-sub {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin: 0 auto 1.5rem;
    }

    header .tagline-sub a { color: var(--accent); text-decoration: none; }
    header .tagline-sub a:hover { text-decoration: underline; }

    .badges {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
    }

    .badge-components { background: var(--accent-subtle); color: var(--accent); border: 1px solid var(--accent); }
    .badge-hooks { background: #3fb95022; color: var(--green); border: 1px solid var(--green); }
    .badge-animated { background: #f0883e22; color: var(--orange); border: 1px solid var(--orange); }

    .architecture {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      margin-bottom: 3rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      line-height: 1.8;
      color: var(--text-muted);
      text-align: center;
    }

    .architecture .flow { color: var(--text); }
    .architecture .arrow { color: var(--accent); }

    .demo-section { margin-bottom: 3rem; }

    .demo-section h2 {
      font-family: var(--font-mono);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    .description {
      color: var(--text-muted);
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .demo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }

    @media (max-width: 900px) {
      .demo-grid { grid-template-columns: 1fr; }
    }

    .panel-label {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 0.5rem 1rem 0.25rem;
    }

    .code-panel, .output-panel {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .code-panel pre {
      padding: 0.75rem 1rem 1rem;
      overflow-x: auto;
      font-family: var(--font-mono);
      font-size: 0.82rem;
      line-height: 1.5;
    }

    .code-panel code { color: var(--text); }

    .terminal-mount {
      padding: 0.25rem 0.5rem 0.5rem;
    }

    /* Override xterm.js background to match our surface */
    .terminal-mount .xterm { background: transparent; }

    footer {
      text-align: center;
      padding: 2rem 0;
      border-top: 1px solid var(--border);
      margin-top: 2rem;
      color: var(--text-muted);
      font-size: 0.9rem;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div id="app">
    <p style="text-align: center; color: #8b949e; padding: 4rem 0;">Loading demos...</p>
  </div>
  <link rel="stylesheet" href="xterm.css">
  <script type="module" src="main.js"></script>
</body>
</html>
