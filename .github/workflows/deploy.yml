name: Deploy Demo Site

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Clone and build rich-js dependency
        run: |
          git clone https://github.com/brandon-fryslie/rich-js.git ../rich-js
          cd ../rich-js
          npm ci
          # tsc emits JS+DTS even with diagnostics (noEmitOnError is unset).
          # Capture exit code without triggering set -e, then verify output.
          tsc_exit=0
          npx tsc -p tsconfig.json --noUnusedLocals false --noUnusedParameters false || tsc_exit=$?
          if [ ! -f dist/index.js ] || [ ! -f dist/index.d.ts ]; then
            echo "ERROR: rich-js build failed — dist/index.js or dist/index.d.ts missing (tsc exit=$tsc_exit)"
            exit 1
          fi
          echo "rich-js built successfully (tsc exit=$tsc_exit, output verified)"

      - run: npm install
      - run: npm run build
      - run: npm run build:site

      - uses: brandon-fryslie/gh-pages-multiplexer@v1
        with:
          source-dir: site/dist
          base-path-mode: rewrite
