<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>rich-js-ink — Live Playground</title>
  <link rel="stylesheet" href="xterm.css">
  <style>
    :root {
      --bg: #0d1117;
      --bg-surface: #161b22;
      --bg-elevated: #1c2129;
      --border: #30363d;
      --border-active: #58a6ff;
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --accent-subtle: #1f6feb33;
      --green: #3fb950;
      --purple: #bc8cff;
      --orange: #f0883e;
      --red: #ff7b72;
      --font-mono: "JetBrains Mono", "Fira Code", "SF Mono", "Cascadia Code", Consolas, monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      line-height: 1.6;
      height: 100vh;
      overflow: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      text-align: center;
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      display: inline;
    }

    header .tagline {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-top: 0.25rem;
    }

    header .tagline-sub {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    /* 3-column playground */
    .playground {
      display: grid;
      grid-template-columns: 200px minmax(0, 1fr) minmax(0, 1fr);
      flex: 1;
      min-height: 0;
      border-bottom: 1px solid var(--border);
    }

    .col {
      display: flex;
      flex-direction: column;
      min-height: 0;
      border-right: 1px solid var(--border);
    }

    .col:last-child { border-right: none; }

    .col-header {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      padding: 0.5rem 0.75rem;
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
      flex-shrink: 0;
    }

    /* Column 1: Selector */
    .col-selector {
      background: var(--bg-surface);
      overflow-y: auto;
    }

    .demo-list {
      list-style: none;
      padding: 0.25rem 0;
    }

    .demo-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      border-left: 2px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }

    .demo-item:hover {
      background: var(--bg-elevated);
    }

    .demo-item.active {
      background: var(--accent-subtle);
      border-left-color: var(--accent);
    }

    .demo-title {
      display: block;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text);
    }

    .demo-item.active .demo-title {
      color: var(--accent);
    }

    .demo-desc {
      display: block;
      font-size: 0.75rem;
      color: var(--text-muted);
      line-height: 1.3;
      margin-top: 0.15rem;
    }

    /* Column 2: Editor */
    .col-editor {
      background: var(--bg);
    }

    #editor-mount {
      flex: 1;
      min-height: 0;
      overflow: hidden;
    }

    #editor-mount .cm-editor {
      height: 100%;
    }

    /* Column 3: Terminal */
    .col-terminal {
      background: var(--bg);
      position: relative;
      overflow: hidden;
    }

    #terminal-mount {
      overflow: hidden;
      flex: 1;
      min-height: 0;
      padding: 0.5rem;
      overflow: hidden;
    }

    .error-display {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: #ff7b7222;
      border-top: 1px solid var(--red);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.5rem 0.75rem;
      max-height: 30%;
      overflow-y: auto;
      white-space: pre-wrap;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 0.5rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      flex-shrink: 0;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    /* Responsive: stack on narrow screens */
    @media (max-width: 900px) {
      body { overflow: auto; }
      #app { height: auto; }
      .playground {
        grid-template-columns: 1fr;
        grid-template-rows: auto 300px 300px;
      }
      .col { border-right: none; border-bottom: 1px solid var(--border); }
      .col-selector { max-height: 200px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <p style="text-align: center; color: #8b949e; padding: 4rem 0;">Loading playground...</p>
  </div>
  <script type="module" src="main.js"></script>
<script><!-- gh-pages-multiplexer:nav-widget -->
(function(){
  var MANIFEST_URL = "../versions.json";
  var INDEX_URL = "../_versions/";
  var CURRENT = "master";
  var ICON_SVG = "<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\"><path d=\"M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z\"/><path d=\"m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65\"/><path d=\"m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65\"/><\/svg>";
  var LABEL_TEMPLATE = "{version}";
  var POSITION = "right 80%";
  var COLOR = "#f97316";
  var SHADOW_CSS = "\n:host { all: initial; }\n*, *::before, *::after { box-sizing: border-box; }\n.root {\n  --widget-bg: #ffffff;\n  --widget-bg-hover: #f6f8fa;\n  --widget-fg: #1f2328;\n  --widget-fg-muted: #656d76;\n  --widget-border: #d0d7de;\n  --widget-accent: #0969da;\n  --widget-accent-hover: #0550ae;\n  --widget-current-bg: #ddf4ff;\n  /* Handle colors — intentionally bright and theme-independent so the tab is obvious on any host page.\n     --handle-bg is overridden at runtime by the user's --widget-color when set. The hover state\n     uses CSS filter rather than a separate color variable, so it works for any base color. */\n  --handle-bg: #f97316;\n  --handle-fg: #ffffff;\n  /* Drawer geometry (single source of truth for the slide math). */\n  --panel-width: 240px;\n  --handle-width: 44px;\n  --peek: 10px;\n  /* Position and edge are runtime-configurable. The drawer's center sits on this y-line. */\n  --position-y: 80%;\n  font-family: -apple-system, BlinkMacSystemFont, \"Segoe UI\", Roboto, sans-serif;\n  font-size: 13px;\n  line-height: 1.4;\n  color: var(--widget-fg);\n}\n@media (prefers-color-scheme: dark) {\n  .root {\n    --widget-bg: #161b22;\n    --widget-bg-hover: #21262d;\n    --widget-fg: #e6edf3;\n    --widget-fg-muted: #8d96a0;\n    --widget-border: #30363d;\n    --widget-accent: #2f81f7;\n    --widget-accent-hover: #539bf5;\n    --widget-current-bg: #0c2d6b;\n  }\n}\n.drawer {\n  position: fixed;\n  /* The drawer's vertical center sits on --position-y (configurable; default 80%). */\n  top: var(--position-y);\n  display: flex;\n  flex-direction: row;\n  align-items: center;\n  z-index: 2147483647;\n  transition: transform 220ms cubic-bezier(0.2, 0.8, 0.2, 1);\n  will-change: transform;\n}\n@media (prefers-reduced-motion: reduce) {\n  .drawer { transition: none; }\n}\n/* [LAW:dataflow-not-control-flow] Edge variant is data: a class on the drawer picks\n   the right anchor + transform direction. No JS state-toggling for layout — only the\n   class assignment at construction time, then CSS does the rest. */\n.drawer.edge-right {\n  right: 0;\n  transform: translate(var(--panel-width), -50%);\n}\n.drawer.edge-right:hover:not(.open) {\n  transform: translate(calc(var(--panel-width) - var(--peek)), -50%);\n}\n.drawer.edge-right.open {\n  transform: translate(0, -50%);\n}\n.drawer.edge-left {\n  left: 0;\n  flex-direction: row-reverse;\n  transform: translate(calc(-1 * var(--panel-width)), -50%);\n}\n.drawer.edge-left:hover:not(.open) {\n  transform: translate(calc(-1 * (var(--panel-width) - var(--peek))), -50%);\n}\n.drawer.edge-left.open {\n  transform: translate(0, -50%);\n}\n.handle {\n  width: var(--handle-width);\n  background: var(--handle-bg);\n  color: var(--handle-fg);\n  border: none;\n  cursor: pointer;\n  /* Padding is content-driven; the icon and label have their own transitions and the\n     handle shrink-wraps to match (no min-height). */\n  padding: 8px 6px;\n  display: flex;\n  flex-direction: column;\n  align-items: center;\n  justify-content: center;\n  gap: 0;\n  font-family: inherit;\n  font-weight: 600;\n  letter-spacing: 0.01em;\n  flex: 0 0 auto;\n  transition: padding 180ms ease-out, filter 180ms ease-out;\n}\n/* [LAW:single-enforcer] Hover darkening uses CSS filter rather than a separate\n   --handle-bg-hover variable so it works for any user-provided color without forcing\n   the user to specify two shades. */\n.handle:hover { filter: brightness(0.92); }\n.handle:focus-visible {\n  outline: 2px solid #ffffff;\n  outline-offset: -4px;\n}\n/* Right-edge handle: rounded LEFT side (the side facing the viewport). */\n.drawer.edge-right .handle {\n  border-top-left-radius: 14px;\n  border-bottom-left-radius: 14px;\n  box-shadow: -4px 0 16px rgba(0,0,0,0.22), inset 1px 0 0 rgba(255,255,255,0.15);\n}\n/* Left-edge handle: rounded RIGHT side (the side facing the viewport). */\n.drawer.edge-left .handle {\n  border-top-right-radius: 14px;\n  border-bottom-right-radius: 14px;\n  box-shadow: 4px 0 16px rgba(0,0,0,0.22), inset -1px 0 0 rgba(255,255,255,0.15);\n}\n/* [LAW:dataflow-not-control-flow] Closed state shows a small icon only. Hover or open\n   state expands the icon and reveals the label. The CSS always applies, the difference\n   is data — the .open class and the :hover pseudo. No JS state-toggling for these. */\n.handle svg {\n  width: 12px;\n  height: 12px;\n  flex-shrink: 0;\n  display: block;\n  transition: width 180ms ease-out, height 180ms ease-out;\n}\n.drawer:hover .handle svg,\n.drawer.open .handle svg {\n  width: 22px;\n  height: 22px;\n}\n.handle .ver {\n  font-size: 11px;\n  line-height: 1.15;\n  max-width: 40px;\n  max-height: 0;\n  margin-top: 0;\n  opacity: 0;\n  overflow: hidden;\n  text-overflow: ellipsis;\n  white-space: nowrap;\n  font-variant-numeric: tabular-nums;\n  text-align: center;\n  transition: max-height 180ms ease-out, opacity 180ms ease-out, margin-top 180ms ease-out;\n}\n.drawer:hover .handle .ver,\n.drawer.open .handle .ver {\n  max-height: 16px;\n  margin-top: 6px;\n  opacity: 1;\n}\n.panel {\n  width: var(--panel-width);\n  max-height: 60vh;\n  overflow-y: auto;\n  background: var(--widget-bg);\n  color: var(--widget-fg);\n  border: 1px solid var(--widget-border);\n  padding: 12px;\n  flex: 0 0 auto;\n}\n.drawer.edge-right .panel {\n  border-right: none;\n  box-shadow: -8px 0 24px rgba(0,0,0,0.18);\n}\n.drawer.edge-left .panel {\n  border-left: none;\n  box-shadow: 8px 0 24px rgba(0,0,0,0.18);\n}\n.panel h2 { font-size: 13px; margin: 0 0 8px 0; font-weight: 600; }\n.index-link {\n  display: block;\n  padding: 8px 12px;\n  color: var(--widget-accent);\n  text-decoration: none;\n  border-radius: 6px;\n  margin-bottom: 4px;\n}\n.index-link:hover { background: var(--widget-bg-hover); }\n.index-link:focus-visible { outline: 2px solid var(--widget-accent); outline-offset: 2px; }\n.rows { display: flex; flex-direction: column; gap: 2px; }\n.row {\n  display: block;\n  padding: 8px 12px;\n  border-radius: 6px;\n  text-decoration: none;\n  color: var(--widget-fg);\n}\n.row:hover { background: var(--widget-bg-hover); }\n.row:focus-visible { outline: 2px solid var(--widget-accent); outline-offset: 2px; }\n.row .ver { font-weight: 600; }\n.row.current { background: var(--widget-current-bg); cursor: default; }\n.row .ref { font-family: ui-monospace, \"SF Mono\", Menlo, Consolas, monospace; font-size: 12px; color: var(--widget-fg-muted); }\n.badge {\n  display: inline-block;\n  font-size: 10px;\n  padding: 1px 6px;\n  border-radius: 10px;\n  background: var(--widget-accent);\n  color: #fff;\n  margin-left: 6px;\n  vertical-align: middle;\n}\n.state { padding: 8px 12px; color: var(--widget-fg-muted); }\n@media (max-width: 600px) {\n  .root { --panel-width: calc(100vw - 72px); }\n}\n";
  var SHADOW_HTML = "\n<div class=\"root\">\n  <div class=\"drawer\" role=\"region\" aria-label=\"Version switcher\">\n    <button class=\"handle\" type=\"button\" aria-expanded=\"false\" aria-controls=\"gh-pm-nav-panel\" aria-label=\"Switch version\">\n      <span class=\"icon-slot\"><\/span>\n      <span class=\"ver\"><\/span>\n    <\/button>\n    <div class=\"panel\" id=\"gh-pm-nav-panel\" role=\"dialog\" aria-label=\"Versions\">\n      <h2>Versions<\/h2>\n      <a class=\"index-link\" href=\"\">← Index<\/a>\n      <div class=\"rows\"><div class=\"state\">Loading versions…<\/div><\/div>\n    <\/div>\n  <\/div>\n<\/div>\n";
  if (customElements.get('gh-pm-nav')) return;
  var GhPmNav = function(){};
  GhPmNav.prototype = Object.create(HTMLElement.prototype);
  function defineEl(){
    class GhPmNav extends HTMLElement {
      constructor(){
        super();
        var root = this.attachShadow({ mode: 'open' });
        root.innerHTML = '<style>' + SHADOW_CSS + '</style>' + SHADOW_HTML;
        this._root = root;
        this._open = false;
        this._loaded = false;
        this._versions = null;
        this._error = null;
        this._drawer = root.querySelector('.drawer');
        this._handle = root.querySelector('.handle');
        this._panel = root.querySelector('.panel');
        this._rows = root.querySelector('.rows');
        this._indexLink = root.querySelector('.index-link');
        this._indexLink.setAttribute('href', INDEX_URL);
        // Inject custom icon SVG into the icon-slot. innerHTML in Shadow DOM does NOT
        // execute scripts, so even malformed SVG is safe to render.
        var iconSlot = root.querySelector('.handle .icon-slot');
        if (iconSlot) { iconSlot.innerHTML = ICON_SVG; }
        // Substitute {version} in the label template, then assign via textContent
        // (no HTML interpretation).
        var verSpan = root.querySelector('.handle .ver');
        var labelText = LABEL_TEMPLATE.split('{version}').join(CURRENT);
        if (verSpan) { verSpan.textContent = labelText; }
        this._handle.setAttribute('aria-label', 'Switch version (current: ' + CURRENT + ')');
        // Apply position: parse "<edge> <vertical%>" and set drawer class + CSS var.
        var posParts = POSITION.trim().split(/\s+/);
        var edge = (posParts[0] === 'left') ? 'left' : 'right';
        var verticalY = posParts[1] || '80%';
        this._drawer.classList.add('edge-' + edge);
        var rootEl = root.querySelector('.root');
        if (rootEl) {
          rootEl.style.setProperty('--position-y', verticalY);
          if (COLOR) { rootEl.style.setProperty('--handle-bg', COLOR); }
        }
        this._onDocClick = this._onDocClick.bind(this);
        this._onKey = this._onKey.bind(this);
        this._handle.addEventListener('click', this._toggle.bind(this));
      }
      _toggle(){
        this._open ? this._close() : this._open_();
      }
      _open_(){
        this._open = true;
        this._drawer.classList.add('open');
        this._handle.setAttribute('aria-expanded', 'true');
        document.addEventListener('click', this._onDocClick, true);
        document.addEventListener('keydown', this._onKey, true);
        if (!this._loaded) { this._fetch(); }
        var first = this._panel.querySelector('a, button, [tabindex]');
        if (first) first.focus();
      }
      _close(){
        this._open = false;
        this._drawer.classList.remove('open');
        this._handle.setAttribute('aria-expanded', 'false');
        document.removeEventListener('click', this._onDocClick, true);
        document.removeEventListener('keydown', this._onKey, true);
        this._handle.focus();
      }
      _onDocClick(e){
        var path = e.composedPath ? e.composedPath() : [];
        if (path.indexOf(this) === -1) { this._close(); }
      }
      _onKey(e){
        if (e.key === 'Escape') { this._close(); }
      }
      _fetch(){
        var self = this;
        fetch(MANIFEST_URL).then(function(r){
          if (!r.ok) throw new Error('manifest http ' + r.status);
          return r.json();
        }).then(function(data){
          self._loaded = true;
          self._versions = (data && data.versions) || [];
          self._render();
        }).catch(function(err){
          self._loaded = true;
          self._error = err;
          self._render();
        });
      }
      _render(){
        if (this._error) {
          this._rows.innerHTML = '<div class="state">Could not load versions</div>';
          return;
        }
        var versions = this._versions || [];
        var html = '';
        for (var i = 0; i < versions.length; i++) {
          var v = versions[i];
          var name = String(v.version || '');
          var ref = String(v.ref || '');
          var isCurrent = (name === CURRENT);
          var safeName = name.replace(/[&<>"']/g, function(c){
            return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
          });
          var safeRef = ref.replace(/[&<>"']/g, function(c){
            return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
          });
          if (isCurrent) {
            html += '<div class="row current"><span class="ver">' + safeName + '</span><span class="badge">current</span><div class="ref">' + safeRef + '</div></div>';
          } else {
            html += '<a class="row" href="../' + encodeURIComponent(name) + '/"><span class="ver">' + safeName + '</span><div class="ref">' + safeRef + '</div></a>';
          }
        }
        if (!html) { html = '<div class="state">No versions</div>'; }
        this._rows.innerHTML = html;
      }
    }
    customElements.define('gh-pm-nav', GhPmNav);
  }
  defineEl();
  var el = document.createElement('gh-pm-nav');
  (document.body || document.documentElement).appendChild(el);
})();
</script></body>
</html>
